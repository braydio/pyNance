[tool.black]
line-length = 120
target-version = ["py311"]
extend-exclude = '''
(.
    \.git
  | \.venv
  | build
  | dist
  | frontend
)/'
'''

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["frontend"]

[tool.ruff.lint]
extend-select = ["I"]
ignore = ["E501", "E203", "E402"]
