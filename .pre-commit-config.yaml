default_language_version:
  python: python3

repos:
  # Black: Python formatter
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  # Ruff: Fast linter / fixer, including import sorting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args:
          - "--fix"
